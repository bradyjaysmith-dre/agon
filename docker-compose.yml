services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: agon
      POSTGRES_PASSWORD: agon
      POSTGRES_DB: agon
    ports:
      - "5432:5432"
    volumes:
      - agon_postgres_data:/var/lib/postgresql/data

volumes:
  agon_postgres_data:
